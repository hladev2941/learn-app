server:
  port: 8083

spring:
  application:
    name: flashcard-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/learn_app?currentSchema=flashcard}
    username: ${DB_USERNAME:learn_user}
    password: ${DB_PASSWORD:learn_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: flashcard
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_pass}

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ── Service URLs for Feign clients ─────────────────────
services:
  auth-url: ${AUTH_SERVICE_URL:http://learn-auth:8081}

# ── OpenFeign client config ────────────────────────────
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
        loggerLevel: BASIC
      auth-service:
        connectTimeout: 3000
        readTimeout: 5000

# ── Claude AI API ──────────────────────────────────────
ai:
  claude:
    api-key: ${CLAUDE_API_KEY:}
    api-url: https://api.anthropic.com/v1/messages
    model: ${CLAUDE_MODEL:claude-sonnet-4-6}
    max-tokens: 2048

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.learnapp.flashcard: DEBUG
